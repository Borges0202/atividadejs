<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script src="index.js"></script>

    <form action="#">

        <fieldset>

            <legend>
                Conversor de moeda
            </legend>

            <label for="real">Real:</label>
            <br>
            <input type="number" id="real">

            <br>

            <input type="button" onclick="conversorMoeda()">Converter</input>

        </fieldset>

        <fieldset>

            <legend>
                Area de triangulo
            </legend>

            <label for="base">Base:</label>
            <br>
            <input type="number" id="base">

            <br>

            <label for="altura">altura:</label>
            <br>
            <input type="number" id="altura">

            <br>

            <input type="button" onclick="calculaArea()">Calcular</input>

        </fieldset>


        <fieldset>

            <legend>
                Dobro e metade
            </legend>

            <label for="DMvalor">Insira o valor a ser analisado:</label>
            <br>
            <input type="number" id="DMvalor">

            <br>

            <input type="button" onclick="dobroMetade()">Calcular</input>

        </fieldset>

        <fieldset>

            <legend>
                Calcula idade
            </legend>

            <label for="anoNascimento">Ano de nascimento</label>
            <br>
            <input type="date" id="anoNascimento">

            <br>

            <label for="anoAtual">Ano atual</label>
            <br>
            <input type="date" id="anoAtual">

            <br>

            <input type="button" onclick="calculaIdade()">Calcular</input>

        </fieldset>

        <fieldset>

            <legend>
                Gorgeta
            </legend>

            <label for="conta">Insira o valor da conta:</label>
            <br>
            <input type="number" id="conta">

            <br>

            <input type="button" onclick="gorgeta()">Calcular</input>

        </fieldset>

        <fieldset>

            <legend>
                Par ou Impar
            </legend>

            <label for="PIvalor">Insira o valor:</label>
            <br>
            <input type="number" id="PIvalor">

            <br>

            <input type="button" onclick="parImpar()">Calcular</input>

        </fieldset>

        <fieldset>

            <legend>
                Maioridade
            </legend>

            <label for="nascimento">Ano de nascimento</label>
            <br>
            <input type="date" id="nascimento">

            <br>

            <label for="atual">Ano atual</label>
            <br>
            <input type="date" id="atual">

            <br>

            <input type="button" onclick="maioridade()">Calcular</input>

        </fieldset>


        <fieldset>

            <legend>
                Confirmar senha
            </legend>

            <label for="senhaUSR">Digite a senha:</label>
            <br>
            <input type="number" id="senhaUSR">

            <br>

            <input type="button" onclick="confirmarSenha()">enviar</input>

        </fieldset>


        <fieldset>

            <legend>
                Comparar numeros
            </legend>

            <label for="numeroA">Digite o numero A:</label>
            <br>
            <input type="number" id="numeroA">

            <br>

            <label for="numeroB">Digite o numero B:</label>
            <br>
            <input type="number" id="numeroB">

            <br>

            <input type="button" onclick="compararNumeros()">enviar</input>

        </fieldset>

        <fieldset>

            <legend>
                Desconto
            </legend>

            <label for="valorCompra">Valor da compra:</label>
            <br>
            <input type="number" id="valorCompra">

            <br>

            <input type="button" onclick="desconto()">enviar</input>

        </fieldset>


        <fieldset>

            <legend>
                Calculo IMC
            </legend>



            <label for="altura">Altura(Em metros):</label>
            <br>
            <input type="number" id="altura">

            <br>

            <label for="peso">Peso:</label>
            <br>
            <input type="number" id="peso">

            <br>

            <input type="button" onclick="calculaIMC()">enviar</input>

        </fieldset>

    </form>
</body>

</html>
